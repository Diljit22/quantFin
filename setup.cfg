[flake8]
# In-line line len of 88 confroms to `Black`
max-line-length = 88

# E203, W503 ignored by `Black`
extend-ignore = E203, W503

docstring-convention = numpy

exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    .eggs,
    *.egg-info

per-file-ignores =
    **/__init__.py: F403, F401
    tests/*: F401, E402
    examples/*: E402